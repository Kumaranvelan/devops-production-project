apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: johnvelan/devops-node-app

        ports:
        - containerPort: 3000

        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: mongo-uri
